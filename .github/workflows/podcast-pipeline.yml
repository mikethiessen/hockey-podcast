name: Podcast Pipeline

on:
  schedule:
    # Runs every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      game_id:
        description: "Game ID to manually generate an episode for (optional)"
        required: false
        default: ""

jobs:
  check-for-game:
    name: Check for completed game
    runs-on: ubuntu-latest
    outputs:
      found: ${{ steps.check.outputs.found }}
      game_id: ${{ steps.check.outputs.game_id }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Handle manual game_id override
        if: ${{ github.event.inputs.game_id != '' }}
        run: |
          echo "found=true" >> $GITHUB_OUTPUT
          echo "game_id=${{ github.event.inputs.game_id }}" >> $GITHUB_OUTPUT
        id: manual

      - name: Sync schedule and check for completed game
        if: ${{ github.event.inputs.game_id == '' }}
        id: check
        run: |
          python scripts/sync_schedule.py
          python scripts/check_schedule.py
        continue-on-error: true

      - name: Propagate manual override outputs
        if: ${{ github.event.inputs.game_id != '' }}
        id: propagate
        run: |
          echo "found=true" >> $GITHUB_OUTPUT
          echo "game_id=${{ github.event.inputs.game_id }}" >> $GITHUB_OUTPUT

  generate-episode:
    name: Generate episode
    runs-on: ubuntu-latest
    needs: check-for-game
    if: needs.check-for-game.outputs.found == 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # ffmpeg is required by pydub for mp3 encoding
          sudo apt-get install -y ffmpeg

      - name: Generate script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_script.py ${{ needs.check-for-game.outputs.game_id }}

      - name: Generate audio
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python scripts/generate_audio.py ${{ needs.check-for-game.outputs.game_id }}

      - name: Upload to Buzzsprout
        env:
          BUZZSPROUT_API_TOKEN: ${{ secrets.BUZZSPROUT_API_TOKEN }}
          BUZZSPROUT_PODCAST_ID: ${{ secrets.BUZZSPROUT_PODCAST_ID }}
        run: python scripts/upload_episode.py ${{ needs.check-for-game.outputs.game_id }}

      - name: Commit updated data back to repo
        run: |
          git config user.name "podcast-bot"
          git config user.email "podcast-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Generated episode for game ${{ needs.check-for-game.outputs.game_id }}"
          git push
